name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag matches app version
        shell: pwsh
        run: |
          $version = @(
            Get-Content core/app_meta.py | Select-String 'APP_VERSION\s*=\s*"([^"]+)"'
          )[0].Matches[0].Groups[1].Value
          if (-not $version) {
            throw "APP_VERSION not found in core/app_meta.py"
          }
          if ("${{ github.ref_name }}" -ne ("v" + $version)) {
            throw "Tag ${{ github.ref_name }} does not match APP_VERSION v$version"
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyserial httpx edge-tts pygame pyttsx3 aiohttp async-timeout yarl multidict

      - name: Build release asset
        shell: pwsh
        run: ./scripts/build_release.ps1

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/ScanServer-windows-x64.zip
          generate_release_notes: true
